<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>線上預約取號系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100vh; overflow: hidden; background-color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    .app-layout { display: flex; flex-direction: column; width: 100%; height: 100%; }
    .app-header { background-color: #1a233a; color: white; padding: 20px; text-align: center; }
    .app-header h2 { font-size: 20px; font-weight: 700; }
    .app-main { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .card { background: white; width: 100%; max-width: 450px; padding: 30px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); text-align: center; border: 1px solid #e2e8f0; }
    
    .status-bar { background-color: #f8fafc; padding: 15px; border-radius: 14px; margin-bottom: 20px; border: 1px solid #f1f5f9; }
    .status-title { font-size: 13px; color: #64748b; font-weight: bold; }
    .status-num { font-size: 42px; font-weight: 800; color: #0284c7; margin-top: 5px; }
    
    .my-number-box { margin: 20px 0; padding: 20px; border-radius: 16px; background-color: #f0fdf4; border: 1px dashed #bbf7d0; }
    .my-num-title { font-size: 14px; color: #16a34a; font-weight: bold; }
    .my-num { font-size: 54px; font-weight: 900; color: #15803d; margin-top: 5px; }
    
    .btn-take { background-color: #0284c7; color: white; border: none; padding: 16px; font-size: 18px; font-weight: 700; border-radius: 12px; width: 100%; cursor: pointer; box-shadow: 0 4px 12px rgba(2,132,199,0.2); }
    .btn-take:active { transform: scale(0.98); background-color: #0369a1; }
    .safe-tip { font-size: 13px; color: #94a3b8; margin-top: 15px; }
  </style>
</head>
<body>

<div class="app-layout">
  <div class="app-header">
    <h2>現場排隊進度查詢</h2>
  </div>

  <div class="app-main">
    <div class="card">
      <div class="status-bar">
        <div class="status-title">📢 目前叫號進度</div>
        <div class="status-num" id="current-num">0 號</div>
      </div>

      <div id="my-number-zone" style="display:none;" class="my-number-box">
        <div class="my-num-title">🎟️ 您的專屬號碼</div>
        <div class="my-num" id="my-num-display">0</div>
        <div id="wait-count-msg" style="font-size:13px; color:#16a34a; margin-top:8px; font-weight:bold;"></div>
      </div>

      <div id="action-zone">
        <button class="btn-take" onclick="takeNumber()">點擊抽取號碼牌</button>
      </div>
      
      <div class="safe-tip" id="security-msg">
        🔒 本系統僅限現場掃描 QR Code 客戶取號
      </div>
    </div>
  </div>
</div>

<script>
  // 🔗 已自動為您對接最新部署的 Google GAS 網址
  var GAS_URL = "https://script.google.com/macros/s/AKfycbwY-RFGOvSvgiyJ4jiQomvnKJ5ENlSNla7F7aLTGvU7iAjJQlDmjuxxqVOTzDn-ehKx/exec";

  function getUrlToken() {
    var urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('loc') || "";
  }

  function updateStatus() {
    var oldScript = document.getElementById('jsonp-status');
    if (oldScript) oldScript.remove();
    var script = document.createElement('script');
    script.id = 'jsonp-status';
    script.src = GAS_URL + "?action=getStatus&callback=handleStatus&_ts=" + new Date().getTime();
    document.body.appendChild(script);
  }

  window.handleStatus = function(status) {
    if(!status) return;
    document.getElementById('current-num').innerText = status.current + " 號";
    
    var todayStr = new Date().toDateString();
    var savedNum = localStorage.getItem('my_queue_num');
    var savedDate = localStorage.getItem('my_queue_date');
    
    if (savedNum && savedDate === todayStr) {
      document.getElementById('my-number-zone').style.display = "block";
      document.getElementById('my-num-display').innerText = savedNum + " 號";
      document.getElementById('action-zone').style.display = "none";
      
      var wait = parseInt(savedNum) - parseInt(status.current);
      if (wait > 0) {
        document.getElementById('wait-count-msg').innerText = "前方還有 " + wait + " 人在等待";
      } else if (wait === 0) {
        document.getElementById('wait-count-msg').innerText = "🎉 輪到您了！請立即臨櫃辦理";
      } else {
        document.getElementById('wait-count-msg').innerText = "❌ 已過號，請洽服務人員";
        document.getElementById('wait-count-msg').style.color = "#ef4444";
      }
    }
  };

  function takeNumber() {
    var token = getUrlToken();
    var oldScript = document.getElementById('jsonp-take');
    if (oldScript) oldScript.remove();
    
    var script = document.createElement('script');
    script.id = 'jsonp-take';
    script.src = GAS_URL + "?action=takeNumber&loc=" + token + "&callback=handleTake&_ts=" + new Date().getTime();
    document.body.appendChild(script);
  }

  window.handleTake = function(result) {
    if(!result) return;
    
    if (result.success) {
      var num = result.nextNumber;
      localStorage.setItem('my_queue_num', num);
      localStorage.setItem('my_queue_date', new Date().toDateString());
      updateStatus();
    } else {
      alert("⚠️ " + result.msg);
    }
  };

  updateStatus();
  setInterval(updateStatus, 5000);
</script>

</body>
</html>
