<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>現場叫號大螢幕看板</title>
  <style>
    /* 滿版鎖定，禁止縮放與滾動，適合電視牆、平板或螢幕長期播放 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100vh; overflow: hidden; background-color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    .tv-layout { display: flex; flex-direction: column; width: 100%; height: 100%; }
    
    /* 看板頂部標題 */
    .tv-header { 
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
      color: white; padding: 3vh 20px; text-align: center; border-bottom: 3px solid #38bdf8;
    }
    .tv-header h1 { font-size: 5vh; font-weight: 800; letter-spacing: 4px; color: #f8fafc; }
    .tv-header p { font-size: 2.2vh; opacity: 0.6; margin-top: 5px; letter-spacing: 2px; }

    /* 中間左右雙櫃檯區 */
    .tv-main { 
      flex: 1; display: flex; width: 100%; background-color: #1e293b; padding: 3vh; gap: 3vh;
    }
    
    /* 櫃檯獨立大字卡 */
    .counter-card { 
      flex: 1; background: #0f172a; border-radius: 30px; display: flex; flex-direction: column; 
      justify-content: space-between; padding: 5vh 20px; text-align: center;
      border: 2px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      transition: all 0.5s ease;
    }
    
    /* 被叫到的櫃檯會發亮閃爍（視覺動態特效） */
    .counter-card.active-call {
      border-color: #38bdf8;
      box-shadow: 0 0 50px rgba(56, 189, 248, 0.4);
      background: linear-gradient(180deg, #0f172a 0%, #0c4a6e 100%);
    }

    .card-title { font-size: 6vh; font-weight: 800; color: #94a3b8; letter-spacing: 2px; }
    .counter-card.active-call .card-title { color: #38bdf8; }

    /* 號碼數字：放大到極致 */
    .card-num { 
      font-size: 22vh; font-weight: 900; color: #ffffff; 
      font-family: 'Impact', 'Arial Black', sans-serif; line-height: 1; margin: auto 0;
    }
    .counter-card.active-call .card-num { color: #38bdf8; animation: blink 1.5s infinite; }

    .card-status { font-size: 4vh; font-weight: bold; color: #64748b; }
    .counter-card.active-call .card-status { color: #f1f5f9; }

    /* 底部跑馬燈或提示欄 */
    .tv-footer { 
      background-color: #0f172a; padding: 2vh 20px; font-size: 2.5vh; color: #38bdf8; 
      font-weight: bold; border-top: 2px solid #334155; text-align: center; letter-spacing: 1px;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="tv-layout">
  <div class="tv-header">
    <h1 id="tv-title">歡迎光臨 ‧ 現場叫號看板</h1>
    <p>請持號碼牌依燈號至指定櫃檯辦理</p>
  </div>

  <div class="tv-main">
    <div id="card-一號" class="counter-card">
      <div class="card-title">一號櫃檯</div>
      <div id="num-一號" class="card-num">0</div>
      <div class="card-status">請前往辦理</div>
    </div>

    <div id="card-二號" class="counter-card">
      <div class="card-title">二號櫃檯</div>
      <div id="num-二號" class="card-num">0</div>
      <div class="card-status">請前往辦理</div>
    </div>
  </div>

  <div class="tv-footer">
    💡 提示：本看板每 3 秒自動更新進度，過號請洽服務人員。
  </div>
</div>

<script>
  // ⚠️【請將下方的網址換成你先前複製的 Google GAS 部署網址（支援前端撈資料的那串）】
  var GAS_URL = "https://script.google.com/macros/s/AKfycby3yH3lTMfhnaEJAdiD9QR31pomS73mwk5xGNecd19fXCDlAS9PrWvNHlFIYfDTVYi9/exec";

  var lastCalledNum = -1;
  var lastCalledCounter = "";

  // 使用 JSONP 跨網域定時從 Google 試算表撈最新叫號資訊
  function updateTV() {
    var oldScript = document.getElementById('jsonp-tv');
    if (oldScript) oldScript.remove();
    
    var script = document.createElement('script');
    script.id = 'jsonp-tv';
    script.src = GAS_URL + "?action=getStatus&callback=handleTVData&_ts=" + new Date().getTime();
    document.body.appendChild(script);
  }

  // 接收後台資料並渲染大螢幕
  window.handleTVData = function(status) {
    if (!status) return;
    
    // 從試算表 B2 儲存格撈出「目前最新的叫號」
    var currentNum = status.current; 
    
    // 另外向後台要求，得知現在這個號碼是哪一個櫃檯叫的（我們稍後會在 .gs 擴充）
    google_get_last_counter(currentNum);
  }

  // 由於我們前端是用 JSONP，我們直接透過第二道請求去向試算表撈出 C2 的櫃檯資料
  function google_get_last_counter(currentNum) {
    var oldScript = document.getElementById('jsonp-counter');
    if (oldScript) oldScript.remove();
    
    var script = document.createElement('script');
    script.id = 'jsonp-counter';
    script.src = GAS_URL + "?action=getLiveCounter&callback=handleCounterData&_ts=" + new Date().getTime();
    document.body.appendChild(script);
    
    window.handleCounterData = function(data) {
      var activeCounter = data.counterName; // 例如: "一號櫃檯" 或 "二號櫃檯"
      
      // 清除先前的發亮特效
      document.getElementById('card-一號').classList.remove('active-call');
      document.getElementById('card-二號').classList.remove('active-call');
      
      // 更新畫面的號碼
      if (activeCounter.indexOf("一號") > -1) {
        document.getElementById('num-一號').innerText = currentNum;
        document.getElementById('card-一號').classList.add('active-call');
        // 沒被叫到的櫃檯維持原號碼或靜態
      } else if (activeCounter.indexOf("二號") > -1) {
        document.getElementById('num-二號').innerText = currentNum;
        document.getElementById('card-二號').classList.add('active-call');
      } else {
        // 如果剛歸零，大家都顯示 0
        document.getElementById('num-一號').innerText = currentNum;
        document.getElementById('num-二號').innerText = currentNum;
      }
    }
  }

  // 每 3 秒對齊一次後台資料
  updateTV();
  setInterval(updateTV, 3000);
</script>

</body>
</html>
