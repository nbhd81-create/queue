<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>現場叫號大螢幕看板</title>
  <style>
    /* 完美複刻：改為截圖中優雅、乾淨的微灰藍色背景 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      width: 100%; 
      height: 100vh; 
      overflow: hidden; 
      background-color: #f1f5f9; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    }
    
    .tv-layout { display: flex; flex-direction: column; width: 100%; height: 100%; }
    
    /* 完美複刻：精緻窄版的深邃科技藍頂條 */
    .tv-header { 
      background-color: #1a233a; 
      color: white; 
      padding: 2.5vh 20px; 
      text-align: center; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    .tv-header h1 { font-size: 4vh; font-weight: 700; letter-spacing: 3px; color: #ffffff; }
    .tv-header p { font-size: 2vh; opacity: 0.6; margin-top: 4px; letter-spacing: 1px; }

    /* 中間左右雙櫃檯區 */
    .tv-main { 
      flex: 1; display: flex; width: 100%; padding: 4vh; gap: 4vh;
    }
    
    /* 完美複刻：帶有大圓角、純白底色與輕柔立體陰影的客戶字卡 */
    .counter-card { 
      flex: 1; 
      background: #ffffff; 
      border-radius: 24px; 
      display: flex; 
      flex-direction: column; 
      justify-content: space-between; 
      padding: 6vh 20px; 
      text-align: center;
      border: 1.5px solid #e2e8f0; 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); 
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* 灰色質感的櫃檯名稱標題 */
    .card-title { font-size: 5.5vh; font-weight: 800; color: #475569; letter-spacing: 2px; }

    /* 完美複刻：極致放大的明亮藍色號碼字體 */
    .card-num { 
      font-size: 24vh; 
      font-weight: 900; 
      color: #0284c7; 
      font-family: 'Arial Black', -apple-system, sans-serif; 
      line-height: 1; 
      margin: auto 0;
    }

    /* 底部狀態提示文字 */
    .card-status { font-size: 3.5vh; font-weight: 700; color: #94a3b8; letter-spacing: 1px; }

    /* 🎯 智慧動態特效：當前被叫到的櫃檯卡片，會觸發截圖中的科技藍發亮外框 */
    .counter-card.active-call {
      border-color: #0284c7;
      background-color: #e0f2fe; /* 輕微藍色高亮底色 */
      box-shadow: 0 0 40px rgba(2, 132, 199, 0.25);
      transform: scale(1.02); /* 微放大，視覺更有衝擊力 */
    }
    .counter-card.active-call .card-title { color: #0369a1; }
    .counter-card.active-call .card-num { animation: blink 1.5s infinite; }
    .counter-card.active-call .card-status { color: #0284c7; }

    /* 最下方狀態列 */
    .tv-footer { 
      background-color: #ffffff; 
      padding: 1.8vh 20px; 
      font-size: 2.2vh; 
      color: #64748b; 
      font-weight: 600; 
      border-top: 1px solid #e2e8f0; 
      text-align: center; 
      letter-spacing: 1px;
    }

    /* 閃爍動畫：提示客戶注意 */
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="tv-layout">
  <div class="tv-header">
    <h1 id="tv-title">歡迎光臨 ‧ 現場叫號看板</h1>
    <p>請持有號碼牌，依燈號至指定櫃檯辦理業務</p>
  </div>

  <div class="tv-main">
    <div id="card-一號" class="counter-card">
      <div class="card-title">一號櫃檯</div>
      <div id="num-一號" class="card-num">0</div>
      <div class="card-status">請前往辦理</div>
    </div>

    <div id="card-二號" class="counter-card">
      <div class="card-title">二號櫃檯</div>
      <div id="num-二號" class="card-num">0</div>
      <div class="card-status">請前往辦理</div>
    </div>
  </div>

  <div class="tv-footer">
    🟢 系統連線正常 ‧ 本看板每 3 秒自動同步最新進度
  </div>
</div>

<script>
  // ⚠️【請將下方的網址換成你先前複製的 Google GAS 部署網址】
  var GAS_URL = "https://script.google.com/macros/s/AKfycby3yH3lTMfhnaEJAdiD9QR31pomS73mwk5xGNecd19fXCDlAS9PrWvNHlFIYfDTVYi9/exec";

  function updateTV() {
    var oldScript = document.getElementById('jsonp-tv');
    if (oldScript) oldScript.remove();
    
    var script = document.createElement('script');
    script.id = 'jsonp-tv';
    script.src = GAS_URL + "?action=getStatus&callback=handleTVData&_ts=" + new Date().getTime();
    document.body.appendChild(script);
  }

  window.handleTVData = function(status) {
    if (!status) return;
    var currentNum = status.current; 
    google_get_last_counter(currentNum);
  }

  function google_get_last_counter(currentNum) {
    var oldScript = document.getElementById('jsonp-counter');
    if (oldScript) oldScript.remove();
    
    var script = document.createElement('script');
    script.id = 'jsonp-counter';
    script.src = GAS_URL + "?action=getLiveCounter&callback=handleCounterData&_ts=" + new Date().getTime();
    document.body.appendChild(script);
    
    window.handleCounterData = function(data) {
      var activeCounter = data.counterName; 
      
      // 重置發亮與底色特效
      document.getElementById('card-一號').classList.remove('active-call');
      document.getElementById('card-二號').classList.remove('active-call');
      
      // 更新對應櫃檯的號碼並觸發亮藍色高亮
      if (activeCounter.indexOf("一號") > -1) {
        document.getElementById('num-一號').innerText = currentNum;
        document.getElementById('card-一號').classList.add('active-call');
      } else if (activeCounter.indexOf("二號") > -1) {
        document.getElementById('num-二號').innerText = currentNum;
        document.getElementById('card-二號').classList.add('active-call');
      } else {
        document.getElementById('num-一號').innerText = currentNum;
        document.getElementById('num-二號').innerText = currentNum;
      }
    }
  }

  updateTV();
  setInterval(updateTV, 3000);
</script>

</body>
</html>
