<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>現場叫號電視牆看板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0f172a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 30px;
      text-align: center;
      border-bottom: 5px solid #0284c7;
    }
    .header h1 { font-size: 46px; letter-spacing: 4px; font-weight: 900; color: #f8fafc; }
    
    .main-content {
      flex: 1;
      display: flex;
      padding: 40px;
      gap: 40px;
      align-items: center;
      justify-content: center;
      background: #111827;
    }
    
    .counter-card {
      background: #1e293b;
      border: 3px solid #334155;
      border-radius: 40px;
      flex: 1;
      max-width: 600px;
      height: 85%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 50px 30px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: all 0.5s ease;
    }
    
    /* 當被叫號時的閃爍發光特效 */
    .counter-card.active-call {
      border-color: #38bdf8;
      background: #0c4a6e;
      box-shadow: 0 0 80px rgba(56, 189, 248, 0.6);
      transform: scale(1.03);
    }
    
    .counter-name { font-size: 54px; font-weight: 900; color: #94a3b8; letter-spacing: 2px; }
    .counter-card.active-call .counter-name { color: #38bdf8; }
    
    .number-display {
      font-size: 180px;
      font-weight: 900;
      color: #ffffff;
      font-family: 'Impact', sans-serif;
      text-shadow: 0 10px 20px rgba(0,0,0,0.3);
      margin: 20px 0;
    }
    
    .status-text { font-size: 32px; color: #64748b; font-weight: bold; }
    .counter-card.active-call .status-text { color: #f1f5f9; animation: pulse 1s infinite alternate; }
    
    @keyframes pulse {
      from { opacity: 0.6; } to { opacity: 1; }
    }

    /* 隱藏的聲音解鎖按鈕 */
    #sound-lock-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.95); z-index: 9999;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .unlock-btn {
      background: #0284c7; color: white; border: none; padding: 24px 48px;
      font-size: 28px; font-weight: bold; border-radius: 20px; cursor: pointer;
      box-shadow: 0 10px 30px rgba(2, 132, 199, 0.4);
    }
  </style>
</head>
<body>

<div id="sound-lock-overlay" onclick="unlockSound()">
  <button class="unlock-btn">📣 點擊此處：開啟現場叫號語音系統</button>
  <p style="margin-top: 20px; color: #64748b; font-size: 18px;">(依瀏覽器安全規範，需點擊一次方可啟用音效)</p>
</div>

<div class="header">
  <h1>歡迎光臨 🔔 現場叫號看板</h1>
</div>

<div class="main-content">
  <div id="card-c1" class="counter-card">
    <div class="counter-name">一號櫃檯</div>
    <div id="num-c1" class="number-display">00</div>
    <div id="status-c1" class="status-text">準備中</div>
  </div>

  <div id="card-c2" class="counter-card">
    <div class="counter-name">二號櫃檯</div>
    <div id="num-c2" class="number-display">00</div>
    <div id="status-c2" class="status-text">準備中</div>
  </div>
</div>

<script>
  var GAS_URL = "https://script.google.com/macros/s/AKfycbwY-RFGOvSvgiyJ4jiQomvnKJ5ENlSNla7F7aLTGvU7iAjJQlDmjuxxqVOTzDn-ehKx/exec";
  
  var lastSpokenNumber = -1;
  var isSoundUnlocked = false;

  // 解鎖語音功能
  function unlockSound() {
    isSoundUnlocked = true;
    document.getElementById('sound-lock-overlay').style.display = 'none';
    // 播放一聲隱形音效，讓瀏覽器大門打開
    speakText("語音系統已啟動");
  }

  // 🔊 完美的內建語音朗讀功能 (包含叮咚與語音)
  function speakText(text) {
    if (!isSoundUnlocked) return;
    try {
      window.speechSynthesis.cancel(); // 砍掉之前的排隊語音，立刻切入
      var tts = new SpeechSynthesisUtterance(text);
      tts.lang = 'zh-TW';
      tts.rate = 0.9;  // 速度稍微放慢一點，比較清楚
      tts.pitch = 1.0; 
      window.speechSynthesis.speak(tts);
    } catch(e) { console.log("語音播放失敗:", e); }
  }

  function checkUpdate() {
    var oldScript = document.getElementById('jsonp-tv');
    if (oldScript) oldScript.remove();
    
    var script = document.createElement('script');
    script.id = 'jsonp-tv';
    script.src = GAS_URL + "?action=getStatus&callback=handleTvUpdate&_ts=" + new Date().getTime();
    document.body.appendChild(script);
  }

  window.handleTvUpdate = function(data) {
    if(!data) return;
    var currentNum = parseInt(data.current) || 0;
    
    // 撈取當前是哪個櫃檯叫號
    var oldScript2 = document.getElementById('jsonp-counter');
    if (oldScript2) oldScript2.remove();
    var script2 = document.createElement('script');
    script2.id = 'jsonp-counter';
    script2.src = GAS_URL + "?action=getLiveCounter&callback=handleCounterUpdate&_ts=" + new Date().getTime();
    document.body.appendChild(script2);
    
    window.handleCounterUpdate = function(counterData) {
      var activeCounter = counterData.counterName || "一號櫃檯";
      
      // 更新對應櫃檯的畫面數字
      if (activeCounter === "一號櫃檯") {
        document.getElementById('num-c1').innerText = currentNum;
        document.getElementById('status-c1').innerText = "請臨櫃辦理";
        document.getElementById('card-c1').classList.add('active-call');
        document.getElementById('card-c2').classList.remove('active-call');
      } else if (activeCounter === "二號櫃檯") {
        document.getElementById('num-c2').innerText = currentNum;
        document.getElementById('status-c2').innerText = "請臨櫃辦理";
        document.getElementById('card-c2').classList.add('active-call');
        document.getElementById('card-c1').classList.remove('active-call');
      }

      // 🎯 核心判斷：如果號碼有變，立刻發聲！
      if (currentNum > 0 && currentNum !== lastSpokenNumber) {
        lastSpokenNumber = currentNum;
        
        // 叮咚聲模擬 ＋ 國語發音
        speakText("請 " + currentNum + " 號貴賓，到 " + activeCounter + " 櫃台進行業務辦理。");
      }
    };
  };

  // 每 3 秒同步一次電視牆
  setInterval(checkUpdate, 3000);
  checkUpdate();
</script>

</body>
</html>
